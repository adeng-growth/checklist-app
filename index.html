<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>中小企业增长自检清单 | 阿登先生</title>
<style>
/* ===== 全局重置 ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue-dark:#1a365d;
  --blue-mid:#2d5a87;
  --blue-light:#3d7ab5;
  --gold:#ffd700;
  --text:#333;
  --bg:#f5f7fa;
  --card:#fff;
  --border:#e0e0e0;
  --radius:12px;
  --shadow:0 4px 20px rgba(0,0,0,.1);
}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","微软雅黑",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ===== 扫码弹窗 ===== */
#qr-modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.qr-box{
  background:#fff;border-radius:20px;
  padding:36px 32px;text-align:center;
  max-width:360px;width:92%;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:slideUp .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.qr-logo-wrap{
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-light));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  color:#fff;font-size:30px;font-weight:800;
  box-shadow:0 6px 20px rgba(26,54,93,.4);
}
.qr-box h2{font-size:19px;color:var(--blue-dark);margin-bottom:6px;font-weight:700;}
.qr-box .sub{font-size:13px;color:#999;margin-bottom:22px;line-height:1.6;}
.qr-svg-wrap{
  width:190px;height:190px;
  border:2px solid #e8eef5;
  border-radius:14px;
  margin:0 auto 18px;
  overflow:hidden;
  background:#fafbff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.04);
}
.qr-features{
  display:flex;gap:8px;justify-content:center;
  margin-bottom:22px;flex-wrap:wrap;
}
.qr-feat{
  background:#f0f5ff;border-radius:20px;
  padding:5px 12px;font-size:12px;color:var(--blue-dark);
  font-weight:600;
}
.btn-start{
  display:block;width:100%;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  color:#fff;border:none;border-radius:12px;
  padding:15px;font-size:16px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 16px rgba(26,54,93,.4);
  transition:all .2s;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,54,93,.5);}

/* ===== 主应用 ===== */
.app{display:none;max-width:760px;margin:0 auto;padding:20px 16px 100px;}
.header{
  background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue-mid) 50%,var(--blue-light) 100%);
  border-radius:16px;padding:28px 24px;color:#fff;
  margin-bottom:18px;position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.header::after{
  content:'';position:absolute;bottom:-30px;left:20px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.hd-badge{
  display:inline-block;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);border-radius:20px;
  padding:4px 14px;font-size:12px;letter-spacing:2px;margin-bottom:10px;
}
.header h1{font-size:22px;font-weight:700;margin-bottom:5px;position:relative;}
.header .author{font-size:12px;opacity:.8;margin-bottom:18px;position:relative;}
.hd-stats{display:flex;gap:20px;position:relative;}
.hd-stat .num{font-size:24px;font-weight:800;color:var(--gold);}
.hd-stat .lab{font-size:11px;opacity:.75;margin-top:1px;}

/* 进度 */
.progress-bar{
  background:#fff;border-radius:12px;
  padding:16px 20px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.progress-info{display:flex;justify-content:space-between;
  margin-bottom:10px;font-size:13px;font-weight:600;}
.progress-info .left{color:var(--blue-dark);}
.progress-info .right{color:#888;}
.track{height:8px;background:#f0f4f8;border-radius:4px;overflow:hidden;}
.fill{height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--blue-dark),var(--blue-light));
  transition:width .5s ease;width:0%;}

/* 维度导航 */
.dim-nav{
  display:flex;gap:8px;overflow-x:auto;
  padding-bottom:2px;margin-bottom:18px;
  scrollbar-width:none;
}
.dim-nav::-webkit-scrollbar{display:none;}
.dim-tab{
  flex-shrink:0;padding:8px 14px;border-radius:20px;
  border:1.5px solid #ddd;background:#fff;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;color:#888;
}
.dim-tab.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}
.dim-tab.done{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}

/* 维度卡片 */
.dim-card{
  background:#fff;border-radius:14px;
  margin-bottom:14px;overflow:hidden;
  box-shadow:var(--shadow);display:none;
}
.dim-card.show{display:block;}
.dim-hd{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  padding:18px 20px;display:flex;align-items:center;gap:14px;color:#fff;
}
.dim-circle{
  width:46px;height:46px;flex-shrink:0;
  background:rgba(255,255,255,.18);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;
}
.dim-hd-text h3{font-size:17px;font-weight:700;margin-bottom:2px;}
.dim-hd-text p{font-size:12px;opacity:.85;}
.dim-score-tag{
  margin-left:auto;background:rgba(255,255,255,.2);
  border-radius:20px;padding:5px 14px;
  font-size:14px;font-weight:700;white-space:nowrap;
}

/* 问题 */
.q-item{
  padding:16px 20px;border-bottom:1px solid #f5f5f5;
  transition:background .2s;
}
.q-item:last-child{border-bottom:none;}
.q-item.answered{background:#f0fdf4;}
.q-row{display:flex;align-items:flex-start;gap:12px;}
.q-no{
  width:28px;height:28px;flex-shrink:0;
  background:#f0f4f8;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--blue-dark);margin-top:2px;
}
.q-text{flex:1;font-size:14px;line-height:1.65;color:#333;}
.q-opts{display:flex;gap:8px;margin-top:12px;padding-left:40px;}
.q-opt{
  flex:1;max-width:120px;
  padding:10px;border-radius:8px;
  border:2px solid #e0e0e0;background:#fff;
  font-size:14px;font-weight:600;cursor:pointer;
  text-align:center;transition:all .2s;
}
.q-opt:hover{border-color:var(--blue-light);background:#f0f5ff;}
.q-opt.yes{background:#e8f5e9;border-color:#43a047;color:#2e7d32;}
.q-opt.no{background:#fce4ec;border-color:#ef5350;color:#c62828;}

/* 导航按钮 */
.dim-nav-btns{
  display:flex;gap:10px;padding:16px 20px;
  background:#fafbff;border-top:1px solid #f0f0f0;
}
.btn-prev,.btn-next{
  flex:1;padding:10px 16px;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-prev{background:#fff;color:var(--blue-dark);border:1.5px solid var(--blue-dark);}
.btn-next{background:var(--blue-dark);color:#fff;border:1.5px solid var(--blue-dark);}
.btn-prev:hover{background:#f0f5ff;}
.btn-next:hover{background:var(--blue-mid);}

/* 用户信息 */
.user-form{
  background:#fff;border-radius:14px;
  padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.user-form h3{font-size:15px;font-weight:700;color:var(--blue-dark);margin-bottom:16px;}
.form-row{display:flex;gap:12px;flex-wrap:wrap;}
.fg{flex:1;min-width:140px;}
.fg label{display:block;font-size:12px;color:#999;margin-bottom:6px;font-weight:600;}
.fg input,.fg select{
  width:100%;padding:10px 12px;
  border:1.5px solid #e5e5e5;border-radius:8px;
  font-size:14px;color:#333;outline:none;
  transition:border-color .2s;background:#fff;
}
.fg input:focus,.fg select:focus{border-color:var(--blue-mid);}

/* 提交 */
.submit-wrap{
  background:#fff;border-radius:14px;
  padding:20px;box-shadow:var(--shadow);
}
.submit-tip{
  font-size:13px;color:#999;
  margin-bottom:14px;text-align:center;line-height:1.6;
}
.btn-submit{
  display:block;width:100%;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  color:#fff;border:none;border-radius:12px;
  padding:16px;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 16px rgba(26,54,93,.4);
  transition:all .2s;
}
.btn-submit:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(26,54,93,.5);
}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ===== 结果弹窗 ===== */
#result-modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  display:none;align-items:flex-start;
  justify-content:center;z-index:9999;
  overflow-y:auto;padding:20px 0;
}
#result-modal.show{display:flex;}
.result-box{
  background:#fff;border-radius:20px;
  max-width:480px;width:92%;
  overflow:hidden;margin:auto;
  animation:slideUp .45s cubic-bezier(.34,1.56,.64,1);
}
.result-hd{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-light));
  padding:30px 24px;text-align:center;color:#fff;
}
.result-hd h2{font-size:20px;margin-bottom:8px;}
.r-badge{
  display:inline-block;padding:6px 20px;
  border-radius:20px;font-size:14px;font-weight:700;margin:8px 0;
}
.rb-danger{background:#ff5252;}
.rb-warning{background:#ff9800;}
.rb-caution{background:#ffc107;color:#333;}
.rb-good{background:#4caf50;}
.rb-great{background:#2196f3;}
.r-score-big{
  font-size:60px;font-weight:800;
  color:var(--gold);line-height:1;margin:10px 0 4px;
}
.r-score-max{font-size:15px;opacity:.7;}
.result-body{padding:24px;}
.dim-scores-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:8px;margin-bottom:20px;
}
.dsc{
  background:#f5f7fa;border-radius:10px;
  padding:10px 6px;text-align:center;
}
.dsc .ds{font-size:22px;font-weight:700;color:var(--blue-dark);}
.dsc .dl{font-size:10px;color:#999;margin-top:2px;line-height:1.3;}
.advice-box{
  background:linear-gradient(135deg,#e3f2fd,#e8f5e9);
  border-radius:12px;padding:16px;margin-bottom:20px;
}
.advice-box h3{
  font-size:15px;font-weight:700;
  color:var(--blue-dark);margin-bottom:10px;
}
.advice-box ul{padding-left:18px;}
.advice-box li{
  font-size:13px;color:#444;
  margin-bottom:7px;line-height:1.6;
}
.result-btns{display:flex;gap:10px;}
.btn-retry,.btn-share{
  flex:1;padding:12px;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;
  border:none;transition:all .2s;
}
.btn-retry{background:#f0f4f8;color:var(--blue-dark);}
.btn-share{background:var(--blue-dark);color:#fff;}
.btn-retry:hover{background:#e0e8f5;}
.btn-share:hover{background:var(--blue-mid);}

/* 保存提示 */
.save-tip{
  text-align:center;font-size:12px;color:#aaa;
  padding:10px 0 2px;
}

/* 悬浮返回顶部 */
.fab-top{
  position:fixed;bottom:28px;right:20px;
  background:var(--blue-dark);color:#fff;
  width:48px;height:48px;border-radius:24px;
  display:none;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 4px 16px rgba(26,54,93,.4);
  cursor:pointer;z-index:50;transition:transform .2s;
}
.fab-top:hover{transform:scale(1.1);}
.app-on .fab-top{display:flex;}

/* 响应式 */
@media(max-width:500px){
  .header h1{font-size:18px;}
  .dim-scores-grid{grid-template-columns:repeat(3,1fr);}
  .q-opts{padding-left:0;}
  .r-score-big{font-size:52px;}
}

/* 问题动画 */
.q-item{animation:qIn .3s ease both;}
@keyframes qIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-item:nth-child(n){animation-delay:calc((var(--i,0)) * 0.05s);}

/* 加载动画 */
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid rgba(255,255,255,.5);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===== 扫码弹窗 ===== -->
<div id="qr-modal">
  <div class="qr-box">
    <div class="qr-logo-wrap">增</div>
    <h2>中小企业增长自检清单</h2>
    <p class="sub">15分钟 · 5大维度 · 50个核心问题<br>精准找到你的增长卡点</p>
    <div class="qr-svg-wrap">
      <canvas id="qr-canvas" width="180" height="180"></canvas>
    </div>
    <div class="qr-features">
      <span class="qr-feat">📊 5大维度</span>
      <span class="qr-feat">❓ 50道题目</span>
      <span class="qr-feat">⚡ 即时诊断</span>
      <span class="qr-feat">💾 数据保存</span>
    </div>
    <button class="btn-start" onclick="startApp()">立即开始自检 →</button>
  </div>
</div>

<!-- ===== 主应用 ===== -->
<div class="app" id="app">

  <div class="header">
    <div class="hd-badge">中小企业增长必备工具</div>
    <h1>中小企业增长自检清单</h1>
    <p class="author">作者：阿登先生 | 中小企业品牌增长实战导师 | 际嘉传媒出品</p>
    <div class="hd-stats">
      <div class="hd-stat"><div class="num">5</div><div class="lab">诊断维度</div></div>
      <div class="hd-stat"><div class="num">50</div><div class="lab">核心问题</div></div>
      <div class="hd-stat"><div class="num" id="h-answered">0</div><div class="lab">已作答</div></div>
      <div class="hd-stat"><div class="num" id="h-cur-score">0</div><div class="lab">当前得分</div></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-info">
      <span class="left">答题进度</span>
      <span class="right" id="pg-text">0 / 50 题</span>
    </div>
    <div class="track"><div class="fill" id="pg-fill"></div></div>
  </div>

  <div class="dim-nav" id="dim-nav"></div>

  <div id="dim-cards"></div>

  <!-- 用户信息 -->
  <div class="user-form">
    <h3>📝 填写联系信息（选填，获取专属建议）</h3>
    <div class="form-row">
      <div class="fg"><label>您的姓名</label><input id="f-name" type="text" placeholder="例：张总"></div>
      <div class="fg"><label>公司名称</label><input id="f-company" type="text" placeholder="例：某某科技有限公司"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>联系电话</label><input id="f-phone" type="tel" placeholder="例：138****0000"></div>
      <div class="fg">
        <label>所属行业</label>
        <select id="f-industry">
          <option value="">请选择行业</option>
          <option>餐饮/食品</option><option>零售/电商</option>
          <option>教育/培训</option><option>美容/健康</option>
          <option>科技/互联网</option><option>服务业</option>
          <option>制造业</option><option>其他</option>
        </select>
      </div>
    </div>
  </div>

  <div class="submit-wrap">
    <div class="submit-tip" id="sub-tip">请完成全部 50 道题目后提交</div>
    <button type="button" class="btn-submit" id="btn-sub" onclick="doSubmit(); return false;" disabled>
      🔍 查看我的诊断结果
    </button>
  </div>

</div>

<div class="fab-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<!-- ===== 结果弹窗 ===== -->
<div id="result-modal">
  <div class="result-box">
    <div class="result-hd">
      <h2>🎯 诊断报告</h2>
      <div id="r-badge" class="r-badge rb-good">健康型</div>
      <div id="r-score" class="r-score-big">35</div>
      <div class="r-score-max">/ 50 分</div>
    </div>
    <div class="result-body">
      <h3 style="font-size:13px;color:#aaa;margin-bottom:12px;font-weight:600;letter-spacing:.5px;">各维度得分</h3>
      <div class="dim-scores-grid" id="r-dim-scores"></div>
      <div class="advice-box" id="r-advice"></div>
      <div class="result-btns">
        <button type="button" class="btn-retry" onclick="doRetry()">🔄 重新自检</button>
        <button type="button" class="btn-share" onclick="doShare()">📤 分享结果</button>
      </div>
      <div class="save-tip" id="r-save-tip">结果已保存到本地</div>
    </div>
  </div>
</div>

<script>
// =====================================================
// 题目数据
// =====================================================
const DIMS = [
  {
    name:'商业模式', desc:'诊断你靠什么赚钱', icon:'💼',
    qs:[
      {id:1, t:"你能用一句话说清楚你是做什么的吗？"},
      {id:2, t:"你知道你的客户是谁、在哪、为什么买你吗？"},
      {id:3, t:"你有没有一个「爆品」贡献超过30%的营收？"},
      {id:4, t:"你的利润来源清晰吗？（不是营业额，是利润）"},
      {id:5, t:"你有没有设计过「客户旅程」？"},
      {id:6, t:"你的产品有没有分层？（引流产品/利润产品/形象产品）"},
      {id:7, t:"你的定价逻辑是什么？（成本定价/竞争定价/价值定价）"},
      {id:8, t:"你有没有计算过「客户终身价值」？"},
      {id:9, t:"你的商业模式有没有「护城河」？"},
      {id:10, t:"你的业务能否离开老板独立运转？"}
    ]
  },
  {
    name:'品牌定位', desc:'诊断客户能不能记住你', icon:'🎯',
    qs:[
      {id:11, t:"你有明确的品牌定位吗？（不是名字，是差异化）"},
      {id:12, t:"客户提到你的行业，第一个想到的是你吗？"},
      {id:13, t:"你的品牌口号是什么？客户能复述出来吗？"},
      {id:14, t:"你的品牌视觉（logo/颜色/风格）统一吗？"},
      {id:15, t:"你有品牌故事吗？"},
      {id:16, t:"你有没有竞争对手？你的差异化是什么？"},
      {id:17, t:"你的产品包装能体现品牌价值吗？"},
      {id:18, t:"客户提到你，会用什么词形容？（你知道吗？）"},
      {id:19, t:"你有品牌资产吗？（品牌歌/视觉锤/金句）"},
      {id:20, t:"你有品牌手册吗？"}
    ]
  },
  {
    name:'流量获客', desc:'诊断你怎么获取客户', icon:'📡',
    qs:[
      {id:21, t:"你知道你的获客成本是多少吗？"},
      {id:22, t:"你的客户主要从哪里来？（线上/线下/转介绍）"},
      {id:23, t:"你有没有内容营销的能力？"},
      {id:24, t:"你的门店/线上店铺转化率是多少？（清楚吗）"},
      {id:25, t:"你的流量来源是否依赖单一渠道？"},
      {id:26, t:"你有没有「免费获客」的方式？"},
      {id:27, t:"你的私域有多少客户？（有明确数据吗）"},

// 答案存储
const answers = {};
let curDim = 0;

// =====================================================
// 初始化
// =====================================================
function init() {
  renderNav();
  renderCards();
  genQRPattern();
}

function renderNav() {
  const nav = document.getElementById('dim-nav');
  nav.innerHTML = DIMS.map((d,i) => `
    <button class="dim-tab ${i===0?'active':''}" id="dtab-${i}" onclick="switchDim(${i})">
      ${d.icon} ${d.name}
    </button>
  `).join('');
}

function renderCards() {
  const cont = document.getElementById('dim-cards');
  cont.innerHTML = DIMS.map((d,di) => `
    <div class="dim-card ${di===0?'show':''}" id="dcard-${di}">
      <div class="dim-hd">
        <div class="dim-circle">${di+1}</div>
        <div class="dim-hd-text">
          <h3>${d.icon} ${d.name}诊断</h3>
          <p>${d.desc}</p>
        </div>
        <div class="dim-score-tag" id="dtag-${di}">0 / 10</div>
      </div>
      <div>
        ${d.qs.map((q,qi) => `
          <div class="q-item" id="qi-${q.id}" style="--i:${qi}">
            <div class="q-row">
              <div class="q-no">${q.id}</div>
              <div class="q-text">${q.t}</div>
            </div>
            <div class="q-opts">
              <button class="q-opt" id="oyes-${q.id}" onclick="pick(${q.id},'yes')">✅ 是</button>
              <button class="q-opt" id="ono-${q.id}" onclick="pick(${q.id},'no')">❌ 否</button>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="dim-nav-btns">
        ${di > 0 ? `<button class="btn-prev" onclick="switchDim(${di-1})">← 上一维度</button>` : ''}
        ${di < 4 ? `<button class="btn-next" ${di===0?'style="max-width:200px;margin:0 auto;"':''} onclick="switchDim(${di+1})">下一维度 →</button>` : ''}
      </div>
    </div>
  `).join('');
}

// =====================================================
// 答题
// =====================================================
function pick(qid, val) {
  answers[qid] = val;
  document.getElementById('oyes-'+qid).className = 'q-opt' + (val==='yes'?' yes':'');
  document.getElementById('ono-'+qid).className = 'q-opt' + (val==='no'?' no':'');
  document.getElementById('qi-'+qid).className = 'q-item answered';
  updateAll();
}

function updateAll() {
  const total = Object.keys(answers).length;
  const yesTotal = Object.values(answers).filter(v=>v==='yes').length;
  document.getElementById('pg-text').textContent = total + ' / 50 题';
  document.getElementById('pg-fill').style.width = (total/50*100) + '%';
  document.getElementById('h-answered').textContent = total;
  document.getElementById('h-cur-score').textContent = yesTotal;

  // 各维度标签
  DIMS.forEach((d,i) => {
    const ds = d.qs.filter(q=>answers[q.id]==='yes').length;
    document.getElementById('dtag-'+i).textContent = ds + ' / 10';
    const dn = d.qs.filter(q=>answers[q.id]!==undefined).length;
    const tab = document.getElementById('dtab-'+i);
    tab.className = 'dim-tab' + (i===curDim?' active':'') + (dn===10?' done':'');
  });

  // 提交按钮
  const btn = document.getElementById('btn-sub');
  const tip = document.getElementById('sub-tip');
  if (total >= 50) {
    btn.disabled = false;
    tip.innerHTML = '✅ 所有题目已完成，点击查看诊断结果！';
    tip.style.color = '#2e7d32';
  } else {
    btn.disabled = true;
    tip.innerHTML = `还有 <strong>${50-total}</strong> 题未完成，请继续作答`;
    tip.style.color = '#999';
  }
}

function switchDim(idx) {
  document.getElementById('dcard-'+curDim).classList.remove('show');
  document.getElementById('dtab-'+curDim).classList.remove('active');
  curDim = idx;
  document.getElementById('dcard-'+idx).classList.add('show');
  document.getElementById('dcard-'+idx).scrollIntoView({behavior:'smooth',block:'start'});
  updateAll();
}

// =====================================================
// 开始
// =====================================================
function startApp() {
  document.getElementById('qr-modal').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.body.classList.add('app-on');
}

// =====================================================
// 提交
// =====================================================
async function doSubmit() {
  const btn = document.getElementById('btn-sub');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>分析中...';

  const payload = {
    answers,
    name: document.getElementById('f-name').value,
    company: document.getElementById('f-company').value,
    phone: document.getElementById('f-phone').value,
    industry: document.getElementById('f-industry').value
  };

  // 本地计算
  const result = calcResult();

  // 尝试提交到服务器
  try {
    const res = await fetch('/api/submit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('r-save-tip').textContent = '✅ 数据已保存到后台数据库（ID: #' + data.id + '）';
      showResult(data);
    } else {
      showResult(result);
    }
  } catch(e) {
    // 离线模式
    document.getElementById('r-save-tip').textContent = '📱 结果已保存到本地（离线模式）';
    showResult(result);
  }
}

function calcResult() {
  const s = (a,b) => DIMS[Math.floor((a-1)/10)].qs.filter(q=>q.id>=a&&q.id<=b&&answers[q.id]==='yes').length;
  const d1=s(1,10),d2=s(11,20),d3=s(21,30),d4=s(31,40),d5=s(41,50);
  const total = d1+d2+d3+d4+d5;
  const type = total<=10?'危机型':total<=20?'问题型':total<=30?'潜力型':total<=40?'健康型':'优秀型';
  return {success:true,score_total:total,score_d1:d1,score_d2:d2,score_d3:d3,score_d4:d4,score_d5:d5,result_type:type};
}

// =====================================================
// 显示结果
// =====================================================
function showResult(data) {
  const {score_total,score_d1,score_d2,score_d3,score_d4,score_d5,result_type} = data;
  const adv = ADVICE_MAP[result_type] || ADVICE_MAP['潜力型'];

  document.getElementById('r-score').textContent = score_total;
  const badge = document.getElementById('r-badge');
  badge.textContent = result_type;
  badge.className = 'r-badge ' + adv.badge;

  const dimNames = ['商业模式','品牌定位','流量获客','转化成交','组织系统'];
  const dimScores = [score_d1,score_d2,score_d3,score_d4,score_d5];
  document.getElementById('r-dim-scores').innerHTML = dimScores.map((s,i) => `
    <div class="dsc">
      <div class="ds" style="color:${s>=7?'#2e7d32':s>=5?'#f57f17':'#c62828'}">${s}</div>
      <div class="dl">${dimNames[i]}</div>
    </div>
  `).join('');

  document.getElementById('r-advice').innerHTML = `
    <h3>📌 针对「${result_type}」的行动建议</h3>
    <ul>${adv.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
  `;

  document.getElementById('result-modal').classList.add('show');

  // 恢复按钮
  const btn = document.getElementById('btn-sub');
  btn.disabled = false;
  btn.textContent = '🔍 查看我的诊断结果';
}

// =====================================================
// 重试 & 分享
// =====================================================
function doRetry() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('result-modal').classList.remove('show');
  // 重置UI
  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('answered'));
  document.querySelectorAll('.q-opt').forEach(el => el.className = 'q-opt');
  switchDim(0);
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('btn-sub').disabled = true;
  document.getElementById('btn-sub').textContent = '🔍 查看我的诊断结果';
  document.getElementById('sub-tip').textContent = '请完成全部 50 道题目后提交';
  document.getElementById('sub-tip').style.color = '#999';
  document.getElementById('h-answered').textContent = '0';
  document.getElementById('h-cur-score').textContent = '0';
  document.getElementById('pg-fill').style.width = '0%';
  document.getElementById('pg-text').textContent = '0 / 50 题';
  DIMS.forEach((_,i) => document.getElementById('dtag-'+i).textContent = '0 / 10');
}

function doShare() {
  const score = document.getElementById('r-score').textContent;
  const type = document.getElementById('r-badge').textContent;
  const txt = `我刚完成了《中小企业增长自检清单》测评，得分 ${score}/50（${type}）。推荐给所有中小企业主！`;
  if (navigator.share) {
    navigator.share({title:'中小企业增长自检清单', text:txt, url:location.href});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => alert('分享文字已复制，可直接粘贴到朋友圈！'));
  } else {
    alert(txt);
  }
}

// =====================================================
// 绘制装饰性二维码图案
// =====================================================
function genQRPattern() {
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');
  const cw = 180, ch = 180;
  const cell = 11;
  const cols = Math.floor(cw / cell);
  const rows = Math.floor(ch / cell);
  const color = '#1a365d';

  ctx.fillStyle = '#fafbff';
  ctx.fillRect(0,0,cw,ch);

  // 固定的定位标记（左上、右上、左下）
  function drawFinder(x, y) {
    ctx.fillStyle = color;
    ctx.fillRect(x*cell, y*cell, 7*cell, 7*cell);
    ctx.fillStyle = '#fafbff';
    ctx.fillRect((x+1)*cell, (y+1)*cell, 5*cell, 5*cell);
    ctx.fillStyle = color;
    ctx.fillRect((x+2)*cell, (y+2)*cell, 3*cell, 3*cell);
  }
  drawFinder(0,0);
  drawFinder(cols-7,0);
  drawFinder(0,rows-7);

  // 随机数据区域
  ctx.fillStyle = color;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // 跳过定位标记区域
      if ((r<8&&c<8)||(r<8&&c>=cols-8)||(r>=rows-8&&c<8)) continue;
      if (Math.random() > 0.55) {
        const s = cell - 1;
        ctx.fillRect(c*cell+0.5, r*cell+0.5, s, s);
      }
    }
  }

  // 中心logo覆盖
  const cx = cw/2, cy = ch/2, lr = 28;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(cx-lr, cy-lr, lr*2, lr*2, 8);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(cx-lr+3, cy-lr+3, (lr-3)*2, (lr-3)*2, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('增', cx, cy+1);
}

init();

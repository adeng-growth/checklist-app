<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 中小企业增长自检清单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue-dark:#1a365d;
  --blue-mid:#2d5a87;
  --blue-light:#3d7ab5;
  --bg:#f5f7fa;
  --card:#fff;
  --text:#333;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}
.header{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  color:#fff;
  padding:24px;
  border-radius:16px;
  margin-bottom:20px;
}
.header h1{font-size:24px;margin-bottom:8px;}
.header p{opacity:.8;font-size:14px;}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.stat-card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.stat-card h3{font-size:13px;color:#999;margin-bottom:8px;font-weight:600;}
.stat-card .num{font-size:32px;font-weight:800;color:var(--blue-dark);}

.toolbar{
  background:var(--card);
  padding:16px 20px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.search-box{
  flex:1;
  min-width:200px;
}
.search-box input{
  width:100%;
  padding:10px 16px;
  border:1.5px solid #e5e5e5;
  border-radius:8px;
  font-size:14px;
  outline:none;
}
.search-box input:focus{border-color:var(--blue-mid);}
.btn{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
}
.btn-primary{
  background:var(--blue-dark);
  color:#fff;
}
.btn-primary:hover{background:var(--blue-mid);}
.btn-success{
  background:#2e7d32;
  color:#fff;
}
.btn-success:hover{background:#388e3c;}
.btn-danger{
  background:#c62828;
  color:#fff;
}
.btn-danger:hover{background:#d32f2f;}

.table-wrap{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
thead{
  background:var(--blue-dark);
  color:#fff;
}
th,td{
  padding:12px 16px;
  text-align:left;
}
th{font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0f0f0;}
tbody tr:hover{background:#f5f7fa;}
.type-badge{
  display:inline-block;
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
}
.type-危机型{background:#ffebee;color:#c62828;}
.type-问题型{background:#fff3e0;color:#e65100;}
.type-潜力型{background:#fff8e1;color:#f57f17;}
.type-健康型{background:#e8f5e9;color:#2e7d32;}
.type-优秀型{background:#e3f2fd;color:#1565c0;}

.pagination{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:20px;
}
.page-btn{
  padding:8px 14px;
  border:1.5px solid #e0e0e0;
  background:#fff;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition:all .2s;
}
.page-btn:hover{background:#f5f7fa;}
.page-btn.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}

.loading{
  text-align:center;
  padding:40px;
  color:#999;
  font-size:14px;
}
.empty{
  text-align:center;
  padding:60px 20px;
  color:#999;
  font-size:14px;
}

.detail-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}
.detail-modal.show{display:flex;}
.detail-box{
  background:#fff;
  border-radius:20px;
  max-width:600px;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  padding:24px;
}
.detail-box h2{font-size:18px;margin-bottom:16px;color:var(--blue-dark);}
.detail-row{margin-bottom:12px;}
.detail-row .label{font-size:12px;color:#999;margin-bottom:4px;font-weight:600;}
.detail-row .value{font-size:14px;color:#333;}
.detail-table{width:100%;border-collapse:collapse;margin-top:16px;}
.detail-table th,.detail-table td{
  padding:8px 12px;
  border:1px solid #e0e0e0;
  font-size:12px;
}
.detail-table th{background:#f5f7fa;font-weight:600;}
.btn-close{
  background:var(--blue-dark);
  color:#fff;
  border:none;
  padding:10px 24px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  margin-top:16px;
  float:right;
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 后台管理系统</h1>
  <p>中小企业增长自检清单 - 数据管理</p>
</div>

<div class="stats" id="stats">
  <div class="stat-card">
    <h3>总提交数</h3>
    <div class="num" id="stat-total">-</div>
  </div>
  <div class="stat-card">
    <h3>平均得分</h3>
    <div class="num" id="stat-avg">-</div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="搜索姓名/公司/电话..." oninput="doSearch()">
  </div>
  <button class="btn btn-success" onclick="doExport()">📥 导出Excel</button>
  <button class="btn btn-danger" onclick="doClear()">🗑️ 清空数据</button>
  <button class="btn btn-primary" onclick="loadData()">🔄 刷新</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>姓名</th>
        <th>公司</th>
        <th>电话</th>
        <th>行业</th>
        <th>总分</th>
        <th>类型</th>
        <th>时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="9" class="loading">正在加载数据...</td></tr>
    </tbody>
  </table>
  <div class="pagination" id="pagination"></div>
</div>

<div class="detail-modal" id="detail-modal">
  <div class="detail-box">
    <h2>📋 详细记录</h2>
    <div id="detail-content"></div>
    <button class="btn-close" onclick="closeDetail()">关闭</button>
  </div>
</div>

<script>
let allData = [];
let filteredData = [];
let currentPage = 1;
const PAGE_SIZE = 20;

// 加载数据
async function loadData() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">正在加载数据...</td></tr>';
  
  try {
    const res = await fetch('/api/records');
    const data = await res.json();
    
    if (data.success) {
      allData = data.records;
      filteredData = allData;
      updateStats();
      renderTable();
    } else {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">加载失败</td></tr>';
    }
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">无法连接服务器</td></tr>';
  }
}

// 更新统计
function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  
  if (allData.length > 0) {
    const avg = allData.reduce((sum, r) => sum + r.score_total, 0) / allData.length;
    document.getElementById('stat-avg').textContent = avg.toFixed(1);
  } else {
    document.getElementById('stat-avg').textContent = '0';
  }
}

// 搜索
function doSearch() {
  const keyword = document.getElementById('search-input').value.toLowerCase();
  
  if (!keyword) {
    filteredData = allData;
  } else {
    filteredData = allData.filter(r => 
      (r.name && r.name.toLowerCase().includes(keyword)) ||
      (r.company && r.company.toLowerCase().includes(keyword)) ||
      (r.phone && r.phone.includes(keyword))
    );
  }
  
  currentPage = 1;
  renderTable();
}

// 渲染表格
function renderTable() {
  const tbody = document.getElementById('table-body');
  const start = (currentPage - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageData = filteredData.slice(start, end);
  
  if (pageData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无数据</td></tr>';
  } else {
    tbody.innerHTML = pageData.map(r => `
      <tr>
        <td>${r.id}</td>
        <td>${r.name || '-'}</td>
        <td>${r.company || '-'}</td>
        <td>${r.phone || '-'}</td>
        <td>${r.industry || '-'}</td>
        <td><strong>${r.score_total}</strong></td>
        <td><span class="type-badge type-${r.result_type}">${r.result_type}</span></td>
        <td>${r.created_at}</td>
        <td><button class="btn btn-primary" style="padding:6px 12px;font-size:12px;" onclick="showDetail(${r.id})">查看</button></td>
      </tr>
    `).join('');
  }
  
  renderPagination();
}

// 分页
function renderPagination() {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  
  if (totalPages <= 1) {
    pag.innerHTML = '';
    return;
  }
  
  let html = '';
  
  if (currentPage > 1) {
    html += `<button class="page-btn" onclick="goPage(${currentPage - 1})">← 上一页</button>`;
  }
  
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage - 3 || i === currentPage + 3) {
      html += '<span style="padding:8px;">...</span>';
    }
  }
  
  if (currentPage < totalPages) {
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})">下一页 →</button>`;
  }
  
  pag.innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  renderTable();
}

// 查看详情
function showDetail(id) {
  const r = allData.find(item => item.id === id);
  if (!r) return;
  
  let answersHtml = '';
  if (r.answers) {
    const dims = ['商业模式', '品牌定位', '流量获客', '转化成交', '组织系统'];
    let answerList = '';
    for (let i = 1; i <= 50; i++) {
      const ans = r.answers[i.toString()];
      const dimIdx = Math.floor((i - 1) / 10);
      answerList += `
        <tr>
          <td>${i}</td>
          <td>${dims[dimIdx]}</td>
          <td>${ans === 'yes' ? '✅ 是' : '❌ 否'}</td>
        </tr>
      `;
    }
    answersHtml = `
      <table class="detail-table">
        <thead><tr><th>题号</th><th>维度</th><th>答案</th></tr></thead>
        <tbody>${answerList}</tbody>
      </table>
    `;
  }
  
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-row">
      <div class="label">ID</div>
      <div class="value">${r.id}</div>
    </div>
    <div class="detail-row">
      <div class="label">姓名</div>
      <div class="value">${r.name || '-'}</div>
    </div>
    <div class="detail-row">
      <div class="label">公司</div>
      <div class="value">${r.company || '-'}</div>
    </div>
    <div class="detail-row">
      <div class="label">电话</div>
      <div class="value">${r.phone || '-'}</div>
    </div>
    <div class="detail-row">
      <div class="label">行业</div>
      <div class="value">${r.industry || '-'}</div>
    </div>
    <div class="detail-row">
      <div class="label">得分</div>
      <div class="value">
        总分: ${r.score_total} | 
        商业模式: ${r.score_d1} | 
        品牌定位: ${r.score_d2} | 
        流量获客: ${r.score_d3} | 
        转化成交: ${r.score_d4} | 
        组织系统: ${r.score_d5}
      </div>
    </div>
    <div class="detail-row">
      <div class="label">类型</div>
      <div class="value"><span class="type-badge type-${r.result_type}">${r.result_type}</span></div>
    </div>
    <div class="detail-row">
      <div class="label">提交时间</div>
      <div class="value">${r.created_at}</div>
    </div>
    <h3 style="margin-top:20px;font-size:15px;color:#1a365d;">答题详情</h3>
    ${answersHtml}
  `;
  
  document.getElementById('detail-modal').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('show');
}

// 导出Excel
function doExport() {
  window.location.href = '/api/export/excel';
}

// 清空数据
async function doClear() {
  if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) {
    return;
  }
  
  if (!confirm('再次确认：真的要删除所有数据吗？')) {
    return;
  }
  
  alert('请联系技术人员手动清空数据库');
}

// 启动
loadData();
</script>
</body>
</html>
